name: Prueba Docker en GitHub Actions

on: [push]

jobs:
  docker-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Levantar contenedor
        # Usamos docker run directamente en lugar de docker-compose
        run: docker run -d --name mi-python python:3.12-slim tail -f /dev/null

      - name: Ejecutar acción dentro del contenedor
        # Verificamos que el contenedor existe y ejecutamos el comando
        run: docker exec mi-python python -c "print('¡Hola desde GitHub Actions dentro de Docker!')"