name: Notificación por Correo

on:
  push:
    branches:
      - main
      - feature_a
      - feature_b

jobs:
  send_email:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar correo
        uses: dawiddr/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Cambios subidos a rama ${{ github.ref_name }}"
          body: "Se han detectado nuevos cambios en la rama ${{ github.ref_name }}. Revisa el repositorio."
          to: tu_correo@ejemplo.com
          from: GitHub Actions <tu_correo@ejemplo.com>